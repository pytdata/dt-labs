<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Test Result Submission</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { padding: 2rem; }
    .test-card { margin-bottom: 1rem; }
    .floating-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 1000;
      border-radius: 50%;
      width: 60px;
      height: 60px;
      font-size: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2 class="mb-4">Submit Test Results</h2>
    <form id="testForm">
      <div id="testsContainer"></div>
      <button type="submit" class="btn btn-primary">Submit</button>
    </form>
    <div id="responseBox" class="mt-4"></div>
  </div>

  <!-- Floating Plus Button -->
  <button type="button" class="btn btn-success floating-btn" id="addTestBtn">+</button>

  <button type="button" class="btn btn-success submit-btn" id="submitBtn">Submit</button>

  <script>
    const testsContainer = document.getElementById('testsContainer');
    const addTestBtn = document.getElementById('addTestBtn');
    let testCount = 0;

    function createTestCard() {
      testCount++;
      const card = document.createElement('div');
      card.className = 'card test-card';
      card.innerHTML = `
        <div class="card-body">
          <h5 class="card-title">Test ${testCount}</h5>
          <div class="row g-3">
            <div class="col-md-3">
              <label class="form-label">Type</label>
              <input type="text" class="form-control" name="testType" required>
            </div>
            <div class="col-md-3">
              <label class="form-label">Result</label>
              <input type="text" class="form-control" name="result" required>
            </div>
            <div class="col-md-2">
              <label class="form-label">Unit</label>
              <input type="text" class="form-control" name="unit">
            </div>
            <div class="col-md-2">
              <label class="form-label">Range</label>
              <input type="text" class="form-control" name="range">
            </div>
            <div class="col-md-12">
              <label class="form-label">Comment</label>
              <input type="text" class="form-control" name="comment">
            </div>
          </div>
        </div>
      `;
      testsContainer.appendChild(card);
    }

    addTestBtn.addEventListener('click', createTestCard);

    // Initialize with one test card
    createTestCard();

    document.querySelector("#submitBtn").addEventListener("click", (e)=> {
        e.preventDefault()

        const data = new FormData(document.querySelector("#submitBtn"));
        console.log(data);
    })

    document.getElementById('testForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const testCards = document.querySelectorAll('.test-card');
      const results = [];

      testCards.forEach(card => {
        const inputs = card.querySelectorAll('input');
        const obj = {};
        inputs.forEach(input => {
          obj[input.name] = input.value;
        });
        results.push(obj);
      });

      const payload = { tests: results };

      try {
        const response = await fetch('/submit-results', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await response.json();
        document.getElementById('responseBox').innerHTML =
          `<div class="alert alert-success">Server Response: ${JSON.stringify(data)}</div>`;
      } catch (err) {
        document.getElementById('responseBox').innerHTML =
          `<div class="alert alert-danger">Error: ${err.message}</div>`;
      }
    });
  </script>
</body>
</html>
